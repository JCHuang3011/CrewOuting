<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動通知總覽</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:     #0b1525;
      --panel:  #0f1f35;
      --border: #1c3350;
      --gold:   #f5a623;
      --orange: #e8621a;
      --green:  #27ae60;
      --blue:   #2980b9;
      --red:    #e74c3c;
      --text:   #dce8f0;
      --muted:  #7a9bb5;
    }

    body {
      font-family: 'Noto Sans TC', 'Microsoft JhengHei', 'PingFang TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      background: linear-gradient(170deg, #071020 0%, #0e2040 55%, #0a1a2e 100%);
      padding: 60px 20px 0;
      text-align: center;
      overflow: hidden;
    }
    .hero-stars { position: absolute; inset: 0; pointer-events: none; }
    .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite alternate; }
    @keyframes twinkle { from { opacity: .2 } to { opacity: .9 } }

    .site-tag {
      display: inline-block;
      background: linear-gradient(90deg, var(--orange), var(--red));
      color: white;
      padding: 5px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    .hero h1 {
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 900;
      line-height: 1.2;
      text-shadow: 0 4px 20px rgba(0,0,0,.7);
      margin-bottom: 10px;
    }
    .hero h1 em { font-style: normal; color: var(--gold); }
    .hero-sub {
      font-size: clamp(13px, 2.5vw, 17px);
      color: var(--muted);
      letter-spacing: 2px;
      margin-bottom: 44px;
    }

    .hero-mountains { display: block; width: 100%; }

    /* ── LAYOUT ── */
    .container { max-width: 860px; margin: 0 auto; padding: 0 20px; }

    /* ── ACTIVITY LIST ── */
    .list-section { padding: 52px 0 60px; }

    .section-heading {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 800;
      color: var(--gold);
      margin-bottom: 32px;
    }
    .section-heading::before {
      content: '';
      display: block;
      width: 5px; height: 20px;
      background: var(--gold);
      border-radius: 3px;
      flex-shrink: 0;
    }

    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .activity-card {
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px 26px;
      text-decoration: none;
      color: inherit;
      transition: transform .2s, border-color .2s, box-shadow .2s;
    }
    .activity-card:hover {
      transform: translateY(-3px);
      border-color: var(--gold);
      box-shadow: 0 8px 30px rgba(245,166,35,.12);
    }

    .ac-date {
      flex-shrink: 0;
      text-align: center;
      background: rgba(245,166,35,.1);
      border: 1px solid rgba(245,166,35,.3);
      border-radius: 12px;
      padding: 12px 16px;
      min-width: 72px;
    }
    .ac-date .month {
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 1px;
    }
    .ac-date .day {
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
      color: var(--gold);
    }
    .ac-date .weekday {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .ac-body { flex: 1; min-width: 0; }
    .ac-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ac-meta {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }

    .ac-arrow {
      flex-shrink: 0;
      font-size: 22px;
      color: var(--muted);
      transition: color .2s, transform .2s;
    }
    .activity-card:hover .ac-arrow {
      color: var(--gold);
      transform: translateX(4px);
    }

    /* empty state */
    .empty-hint {
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      padding: 40px 0;
      border: 1px dashed var(--border);
      border-radius: 14px;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 28px 20px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      line-height: 2;
    }
    footer b { color: var(--gold); }
  </style>
</head>
<body>

<!-- ════════════ HERO ════════════ -->
<header class="hero">
  <div class="hero-stars" aria-hidden="true">
    <div class="star" style="width:2px;height:2px;top:8%;left:5%;animation-delay:0s"></div>
    <div class="star" style="width:1.5px;height:1.5px;top:12%;left:18%;animation-delay:.5s"></div>
    <div class="star" style="width:2px;height:2px;top:5%;left:32%;animation-delay:1s"></div>
    <div class="star" style="width:1px;height:1px;top:18%;left:48%;animation-delay:.3s"></div>
    <div class="star" style="width:2px;height:2px;top:7%;left:62%;animation-delay:1.5s"></div>
    <div class="star" style="width:1.5px;height:1.5px;top:14%;left:75%;animation-delay:.8s"></div>
    <div class="star" style="width:1px;height:1px;top:9%;left:88%;animation-delay:.2s"></div>
    <div class="star" style="width:2px;height:2px;top:22%;left:93%;animation-delay:1.2s"></div>
  </div>

  <div class="site-tag">🏃 活動通知</div>
  <h1><em>活動通知總覽</em></h1>
  <p class="hero-sub">點擊活動卡片查看詳細通知</p>

  <svg class="hero-mountains" viewBox="0 0 1200 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <linearGradient id="hm1" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1a3a2a"/>
        <stop offset="100%" stop-color="#0b1525"/>
      </linearGradient>
      <linearGradient id="hm2" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#0f2a1f"/>
        <stop offset="100%" stop-color="#0b1525"/>
      </linearGradient>
    </defs>
    <polygon points="0,120 0,80 80,40 180,70 300,20 420,60 540,10 660,55 780,8 900,50 1020,5 1140,45 1200,30 1200,120"
             fill="url(#hm1)" opacity=".6"/>
    <polygon points="0,120 0,95 100,65 200,88 340,45 480,80 580,38 700,75 820,30 940,72 1060,28 1180,62 1200,55 1200,120"
             fill="url(#hm2)"/>
  </svg>
</header>

<!-- ════════════ MAIN ════════════ -->
<main class="container">
  <section class="list-section">
    <div class="section-heading">所有活動</div>

    <div class="activity-list">

      <!-- ★ 在此新增活動，複製下方卡片格式 ★ -->

      <a href="20260606-擎天崗.html" class="activity-card">
        <div class="ac-date">
          <div class="month">2026 / 06</div>
          <div class="day">06</div>
          <div class="weekday">六</div>
        </div>
        <div class="ac-body">
          <div class="ac-title">備戰塔塔加之666約騎擎天崗</div>
          <div class="ac-meta">
            📍 淡水 → 巴拉卡公路 → 二子坪 → 陽金公路 → 中湖戰備道 → 擎天崗<br>
            🏔️ 距離 52km · 爬升 1,194m　⏰ 07:00 出發
          </div>
        </div>
        <div class="ac-arrow">›</div>
      </a>

    </div>
  </section>
</main>

<!-- ════════════ FOOTER ════════════ -->
<footer>
  <b>活動通知總覽</b>
  <p style="margin-top:6px;">大家加油！享受運動的樂趣 🚴‍♂️🏃‍♀️🏊‍♂️</p>
</footer>

</body>
</html>
